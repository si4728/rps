<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>가위바위보 플랫폼 - 입장</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <div class="container">
    <h1>가위·바위·보 온라인 플랫폼 (MVP)</h1>
    <p class="muted">이름을 입력하고 입장하세요. 서버가 생성 순번대로 ID를 부여합니다.</p>
    <form action="/enter" method="post" class="card">
      <label>이름</label>
      <input type="text" name="name" placeholder="예: 홍길동" maxlength="64" required/>
      <button type="submit">입장</button>
    </form>
    <div class="footer">
      <a href="/admin">관리자 화면</a>
    </div>
  </div>
</body>
</html>
